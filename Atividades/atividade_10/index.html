<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>atividade_10</title>
    <link href="css/estilo.css" rel="stylesheet" type="text/css" media="all">
    
   
</head>
<body>

    <!-- A tag <h1> no HTML define o título principal 
        e mais importante de uma página web, indicando seu tema central -->

    <header >
        <!-- A tag <header> no HTML5 serve para definir o cabeçalho de uma página ou de uma
        seção específica (como <article> ou <section>), agrupando conteúdos introdutórios, logotipos,
        títulos (<h1>-<h6>) e menus de navegação. Ela melhora a semântica do código, 
        facilitando a leitura por motores de busca (SEO) e leitores de tela.  -->

       <!-- O display: flex no CSS serve para criar layouts unidimensionais responsivos, 
       alinhando e distribuindo itens automaticamente dentro de um container -->

       <!-- A propriedade justify-content do CSS, usada principalmente com Flexbox e Grid, 
        serve para alinhar e distribuir o espaço entre os elementos (itens) 
        ao longo do eixo principal (horizontal por padrão) de um contêiner -->
       <div class="youcast-now">
            <div class ="container" style="margin: -2px 0px">
                <div class="nome-logo" style="margin: 30px 5px;">
                    <h1 >YouCast</h1>
                </div>
                <div class="nome-logo" style="margin: 30px 5px"> 
                    <h3>NOW</h3>
                </div>
             </div>
        </div> 
        <nav>
            <!--A tag <nav> no HTML5 serve para definir uma seção que contém links de navegação, 
                como menus principais, sumários ou índices  -->
                <ul>
                <!--A tag <ul> (Unordered List) no HTML serve para criar listas não ordenadas
                (ou listas com marcadores), onde a ordem dos itens não é crucial.  Ela agrupa itens (<li>) usando 
                símbolos padrão, como
                pontos (bullets), círculos ou quadrados, ideal para menus, listas de recursos ou itens genéricos.-->
                <li style="border-bottom: 3px solid #0c0;"> Streaming</li>
                <li>DISCOVER</li>
                <!--  A tag <i> no HTML serve para representar um trecho de texto que se destaca do restante,
                 geralmente exibido em itálico -->
                 <li class="now"> <i >CAST NOW</i></li>
                 <li><img src="img/user.png" alt="Usuário" class="usuario"></li>
                </ul>
        </nav>
        
    </header>
    
</body>
</html>
