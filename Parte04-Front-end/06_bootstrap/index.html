framework é o nome dado para algumas ferramentas que tem

<!-- a primeira coisa que se deve fazer é a instalação do bootstrap
 
a cada novo projeto deve-se instalar o bootstrap, não é por maquina é por PROJETO
 hyu -->


<!doctype html>
<html lang="pt-br">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    <!-- link do bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
     rel="stylesheet"
     integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
     crossorigin="anonymous">

<!-- meu css -->
 <link href="css/estilo.css" rel="stylesheet" type="text/css" media="all">
</head>

<body>
    <h1></h1>
    <!-- menu superior -->
    <nav class="navbar navbar-expand-lg bg-cute">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">
               <img src="img/black.png" alt="logo menu" class="logo"  style="width: 70px; height: 70px;"> </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false"
                aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link active" aria-current="page" href="#">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">Link</a>
                    </li>
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown"
                            aria-expanded="false">
                            Dropdown
                        </a>
                        <ul class="dropdown-menu">
                            <li><a class="dropdown-item" href="#">Action</a></li>
                            <li><a class="dropdown-item" href="#">Another action</a></li>
                            <li>
                                <hr class="dropdown-divider">
                            </li>
                            <li><a class="dropdown-item" href="#">Something else here</a></li>
                        </ul>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link disabled" aria-disabled="true">Disabled</a>
                    </li>
                </ul>
                <form class="d-flex" role="search">
                    <input class="form-control me-2" type="search" placeholder="Search" aria-label="Search" />
                    <button class="btn btn-outline-success" type="submit">Search</button>
                </form>
            </div>
        </div>
    </nav>

    <!-- fim do menu superior -->
     <!-- conteudo da pagina -->
      <main>
        <div class="container" >
        <!-- o bootstrap ja vem com uma classe container logo não precisamos criar essa classe. Porém,
          class container de=o bootstrap é diferente da que estavamos trabalhando. qnd utilizamod o container c o boot =strap automaticamente 
          conseguimos divir a tela 12 colunas -->
          <h1 style="font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;">Formulário BootStrap</h1>
          <hr> 
          <!-- A tag <hr> no HTML representa uma quebra temática ou linha horizontal, usada para separar conteúdos, 
           mudar de tópico ou dividir seções. É um elemento auto-fechável (não precisa de </hr>), 
           estilizado com CSS para alterar cor, espessura e estilo. É semanticamente importante para indicar mudança de -->


          <form method="">
            <div class="row">
                <div class="col-12 col-md-10 col-lg-10 col-xl-6 ">
                    <!-- col-12 é o tamanho para celular -->
                    <label for="nome" class="form-label" > Primeiro nome: </label>
                    <input class="form-control" type="text" placeholder="Informe o primeiro nome:" 
                    aria-label="nome"><!-- eu peguei o conteudo dessa ultima div class do get bootstrap 
                 entrando em docs clicando na seão de forms o control forms e cpiando o segundo codigo da seção sizing -->
                 <!-- placeholder é aquele texto cinza que aparece nas barras antes que preencha as colunas -->
                </div> 
                <div class="col-12 col-md-6 col-lg-4 col-xl-6 ">
                    <label for="sobrenome" class="form-label" > Sobrenome: </label>
                    <input class="form-control" type="text" placeholder="Informe o sobrenome:" 
                    aria-label="sobrenome">
                </div>
                <div class="col-12 col-md-6 col-lg-4 col-xl-4 ">
                    <label for="cpf" class="form-label" > CPF: </label>
                    <input class="form-control" type="text" placeholder="Informe o CPF:" 
                    aria-label="cpf">
                </div>
                    <div class="col-12 col-md-4 col-lg-4 col-xl-3 ">
                    <label for="telefone" class="form-label" > Telefone: </label>
                    <input class="form-control" type="tel" placeholder="(ddd) xxxxx-xxxx:" 
                    aria-label="telfone">
                </div>
                <div class="col-6 col-md-4 col-lg-4 col-xl-2 ">
                    <label for="nascimento" class="form-label" > Data de Nascimento: </label>
                    <input class="form-control" type="date"     aria-label="dataNascimento">
                </div>
                <div class="col-6 col-md-6 col-lg-4 col-xl-2 ">
                    <label for="genero" class="form-label" > Gênero: </label>
                   <select class="form-select" aria-label="genero">
                     <!-- ao inves de input eu ocloco o select opção do bootstrap -->
                    <option selected>Gênero</option>
                    <option value="1">Femenino</option>
                    <option value="2">Masculino</option>
                     <option value="3">Outro</option>
            </select>
                </div>
                    
                <div class="d-flex justify-content-end mt-5">
                    <button type="submit" class="btn btn-success" >Enviar</button>
                </div>
          </form>
        </div>
      </main>

    <!-- qnd estiver um <script> esta relacionado ao java script -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
