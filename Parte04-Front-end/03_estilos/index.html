<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bye Bye </title>
   
<!-- css interno -->
 <style>
/* <!-- Com a @font-face regra CSS, os web designers não 
 precisam mais usar uma das fontes "seguras para a web".

Na @font-faceregra, você deve primeiro definir um nome para a
 fonte (por exemplo, myFirstFont) e, em seguida, indicar o arquivo
  da fonte.
  Para usar a fonte em um elemento HTML, referencie o nome da fonte (myFirstFont) 
  através da propriedade font-family: --> */
  @font-face {
            font-family: Playwrite Norge ;
            src: url(fonts/PlaywriteNO.ttf);
        }
    /*  font-family:    is a required font properties 
    	src:  url()      is a Required font properties. 
    Defines the URL(s) where the font should be downloaded from */
    body {
            font-family: Playwrite Norge;
            padding: 20px 100px;
            background-color: lightskyblue;
            color: rgb(139, 139, 139);
        }
    h1, h2, p {
            text-shadow: 1px 2px 20px rgb(207, 207, 207);
        }
    h1, h2, p {
            text-align: center;
        } 
        h1{
            font-size: 60px;
        }
        h2{
            font-size: 160px;
            font-family: Arial, Helvetica, sans-serif;
        }
        p{
            font-size: 40px
        }
 </style>

</head>
    
<body>
    <h1>Funerária Você é o Próximo</h1>

    <h2>

        †
    </h2>
    
</body>
<p> Die bitch! </p>
</html>
