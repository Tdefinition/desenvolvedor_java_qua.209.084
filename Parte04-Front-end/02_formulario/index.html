    <link href="img/kitty.png" rel="shortcut icon" type ="image/png">

<body>
    
    <h1> Página do link</h1>

    <!-- link -->
     <p><a href= "form.html"> Clique neste link para ir para o formulário </a></p>

    <!-- link externo -->
     <a href = "form.html">
        <img src="img/link.png" width="800" alt="Link">

</body>

<!-- quebra de linha <br> -->
<!--  <p> representa uma parágrafo. Parágrafos são usados para agrupar
     conteúdos relacionados de qualquer tipo, como imagens e campos de um formulário -->

    <!-- como fazer para abrir em uma nova guia?
     target="_blank": É o atributo chave que define o comportamento de nova aba/janela
     exemplo
     <a href="https://www.exemplo.com" target="_blank">Abrir em nova guia</a>
 -->
     <!-- A tag <a> (âncora) no HTML é fundamental para criar hiperlinks, 
    conectando páginas, arquivos ou seções. 
    O atributo essencial href define o destino do link, 
    enquanto o conteúdo entre <a> e </a> é o texto clicável. 
    Links são azuis/sublinhados por padrão e roxos após visitados -->
